<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&A Automated Combat Resolver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .input-cell { width: 100%; text-align: center; background-color: #21262d; border: 1px solid #30363d; color: #f0f6fc; padding: 4px 8px; border-radius: 6px; }
        .header { background-color: #161b22; color: #f0f6fc; font-weight: 700; text-align: center; padding: 12px 4px; }
        .damage-marker-label { font-size: 0.6rem; font-weight: 600; color: #dc2626; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-6 text-yellow-400">A&A Live Combat Board</h1>

        <div class="overflow-x-auto rounded-xl border border-gray-700">
            <table class="w-full text-xs md:text-sm text-left">
                <thead>
                    <tr class="header grid grid-cols-6">
                        <th class="col-span-1">UNIT</th>
                        <th class="col-span-1">ATTACK</th>
                        <th class="col-span-1">DEFEND</th>
                        <th class="col-span-1 text-red-400">ATTACKER</th>
                        <th class="col-span-1 text-green-400">DEFENDER</th>
                        <th class="col-span-1 text-yellow-500">REMAINING</th>
                    </tr>
                </thead>
                <tbody id="unitTableBody"></tbody>
            </table>
        </div>

        <div class="mt-8 flex flex-col space-y-3">
            <button id="calculateButton" onclick="calculateCombat()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-xl transition focus:ring-4 focus:ring-blue-500/50">
                Run Automated Combat Round
            </button>
            <button onclick="clearBattle()" class="w-full py-3 bg-gray-600 hover:bg-gray-700 text-white font-bold rounded-xl shadow-xl transition">
                Clear Battle
            </button>
        </div>
        <div id="messageBox" class="mt-6 p-4 rounded-xl text-center font-semibold hidden"></div>
    </div>

    <script>
        const UNIT_DATA = [
            { id: 'inf', name: 'Infantry', ool: 1, attack: 1, defense: 2 },
            { id: 'art', name: 'Artillery', ool: 2, attack: 2, defense: 2 },
            { id: 'tank', name: 'Tank', ool: 3, attack: 3, defense: 3 },
            { id: 'fig', name: 'Fighter', ool: 4, attack: 3, defense: 4, isAir: true },
            { id: 'bomb', name: 'Bomber', ool: 5, attack: 4, defense: 1, isAir: true },
            { id: 'sub', name: 'Submarine', ool: 6, attack: 2, defense: 2, complex: 'submerge' }, 
            { id: 'dd', name: 'Destroyer', ool: 7, attack: 2, defense: 2 },
            { id: 'cruiser', name: 'Cruiser', ool: 8, attack: 3, defense: 3 },
            { id: 'car', name: 'Aircraft Carrier', ool: 9, attack: 1, defense: 2 }, 
            { id: 'bb', name: 'Battleship', ool: 10, attack: 4, defense: 4, complex: 'damage-checkbox' }, 
            { id: 'aa', name: 'AA Gun', ool: 99, attack: 0, defense: 1, isAA: true }, 
            { id: 'trans', name: 'Transport', ool: 100, attack: 0, defense: 0 }
        ].sort((a, b) => a.ool - b.ool);

        function updateAttackDisplay() {
            const artA = parseInt(document.getElementById('A-art')?.value) || 0;
            const infA = parseInt(document.getElementById('A-inf')?.value) || 0;
            const el = document.getElementById('A-ATK-inf');
            if (el) el.textContent = (artA > 0 && infA > 0) ? '≤2' : '≤1';
        }

        function updateBBMarkers(side) {
            const count = Math.min(parseInt(document.getElementById(`${side}-bb`)?.value) || 0, 12);
            const container = document.getElementById(`${side}-bb-markers`);
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                container.innerHTML += `<div class="flex items-center space-x-0.5"><input type="checkbox" id="${side}-bb-dmg-${i}" onchange="syncToFirebase()" class="accent-red-500"><label class="damage-marker-label">Hit</label></div>`;
            }
        }

        function renderRows() {
            document.getElementById('unitTableBody').innerHTML = UNIT_DATA.map(u => `
                <tr class="grid grid-cols-6 border-t border-gray-700/50">
                    <td class="col-span-1 p-4"><strong>${u.name}</strong></td>
                    <td id="A-ATK-${u.id}" class="col-span-1 p-4 text-center text-red-400 font-bold">${u.attack > 0 ? '≤' + u.attack : '-'}</td>
                    <td class="col-span-1 p-4 text-center text-green-400 font-bold">${u.defense > 0 ? '≤' + u.defense : '-'}</td>
                    <td class="col-span-1 p-2">
                        <input type="number" id="A-${u.id}" value="0" class="input-cell" oninput="updateAttackDisplay(); ${u.id==='bb'?'updateBBMarkers(\'A\')':''}">
                        ${u.id==='sub' ? `<div class="flex justify-center mt-1"><input type="checkbox" id="A-sub-submerge" onchange="syncToFirebase()"><label class="damage-marker-label text-blue-400 ml-1">Sub?</label></div>` : ''}
                        <div id="A-bb-markers" class="flex flex-wrap justify-center gap-1 mt-1"></div>
                        <div id="A-${u.id}-rolls" class="text-[10px] text-red-300 text-center mt-1"></div>
                    </td>
                    <td class="col-span-1 p-2">
                        <input type="number" id="D-${u.id}" value="0" class="input-cell" oninput="${u.id==='bb'?'updateBBMarkers(\'D\')':''}">
                        ${u.id==='sub' ? `<div class="flex justify-center mt-1"><input type="checkbox" id="D-sub-submerge" onchange="syncToFirebase()"><label class="damage-marker-label text-green-400 ml-1">Sub?</label></div>` : ''}
                        <div id="D-bb-markers" class="flex flex-wrap justify-center gap-1 mt-1"></div>
                        <div id="D-${u.id}-rolls" class="text-[10px] text-green-300 text-center mt-1"></div>
                    </td>
                    <td class="col-span-1 p-2 text-center flex flex-col justify-center border-l border-gray-800">
                        <div id="A-${u.id}-rem" class="text-red-500 font-black"></div>
                        <div id="D-${u.id}-rem" class="text-green-500 font-black"></div>
                    </td>
                </tr>`).join('');
        }

        function getList(side) {
            let list = [];
            const subMerged = document.getElementById(`${side}-sub-submerge`)?.checked || false;
            UNIT_DATA.forEach(u => {
                const count = parseInt(document.getElementById(`${side}-${u.id}`)?.value) || 0;
                for (let i = 0; i < count; i++) {
                    let obj = { ...u, isSubmerged: u.id==='sub' ? subMerged : false };
                    if (u.id === 'bb') {
                        const cb = document.getElementById(`${side}-bb-dmg-${i}`);
                        obj.isDamaged = cb ? cb.checked : false;
                    }
                    list.push(obj);
                }
            });
            return list;
        }

        function assignCasualties(unitList, hits, side, hunter, airOnly = false) {
            let remain = [...unitList];
            let hL = hits;
            while (hL > 0 && remain.length > 0) {
                remain.sort((a,b) => {
                    if (airOnly) { if (a.isAir && !b.isAir) return -1; if (!a.isAir && b.isAir) return 1; }
                    if (!hunter && a.isSubmerged && !b.isSubmerged) return 1;
                    if (!hunter && !a.isSubmerged && b.isSubmerged) return -1;
                    if (side === 'D' && a.id === 'bb' && a.isDamaged && !b.isDamaged) return -1;
                    return a.ool - b.ool;
                });
                let target = remain[0];
                if (airOnly && !target.isAir) break;
                if (!hunter && target.isSubmerged) break;
                if (target.id === 'bb' && !target.isDamaged) { target.isDamaged = true; } else { remain.shift(); }
                hL--;
            }
            return remain;
        }

        async function calculateCombat() {
            let aL = getList('A'); let dL = getList('D');
            const aH = aL.some(u => u.id === 'dd' || u.id === 'sub');
            const dH = dL.some(u => u.id === 'dd' || u.id === 'sub');

            let aaH = 0; let aaRArr = [];
            const attPlanes = aL.filter(u => u.isAir);
            if (dL.some(u => u.id === 'aa') && attPlanes.length > 0) {
                attPlanes.forEach(() => { 
                    const r = Math.floor(Math.random()*6)+1; aaRArr.push(r); if(r === 1) aaH++;
                });
                document.getElementById('D-aa-rolls').innerHTML = aaRArr.join(',') + ' (AA)';
            }

            const rollS = (l, side, h) => { 
                let hits=0; let rArr=[];
                const activeSubs = l.filter(u=>u.id==='sub'&&u.isSubmerged&&!h);
                activeSubs.forEach(()=>{ 
                    const r = Math.floor(Math.random()*6)+1; rArr.push(r); if(r<=2) hits++; 
                });
                document.getElementById(`${side}-sub-rolls`).innerHTML = rArr.join(',') + ' (FS)';
                return hits;
            };
            const aSH = rollS(aL, 'A', dH); const dSH = rollS(dL, 'D', aH);

            aL = assignCasualties(aL, aaH + dSH, 'A', true);
            dL = assignCasualties(dL, aSH, 'D', true);

            const rollR = (l, side, isA) => {
                let h = 0; const artB = isA && l.some(u=>u.id==='art');
                UNIT_DATA.forEach(u => {
                    if (u.id === 'aa') return;
                    const rollers = l.filter(x=>x.id===u.id && !(u.id==='sub' && x.isSubmerged));
                    let rArr = []; rollers.forEach(() => {
                        const t = isA ? ((u.id==='inf'&&artB)?2:u.attack) : u.defense;
                        const r = Math.floor(Math.random()*6)+1; rArr.push(r); if(r<=t) h++;
                    });
                    document.getElementById(`${side}-${u.id}-rolls`).innerHTML = rArr.join(',');
                });
                return h;
            };

            const aHits = rollR(aL, 'A', true); const dHits = rollR(dL, 'D', false);
            const fD = assignCasualties(dL, aHits, 'D', aH);
            const fA = assignCasualties(aL, dHits, 'A', dH);

            const refresh = (l, s) => {
                UNIT_DATA.forEach(u => {
                    const c = l.filter(x=>x.id===u.id).length;
                    document.getElementById(`${s}-${u.id}`).value = c;
                    document.getElementById(`${s}-${u.id}-rem`).textContent = c > 0 ? c : '';
                    if (u.id === 'bb') {
                        updateBBMarkers(s);
                        const dmgC = l.filter(x=>x.id==='bb' && x.isDamaged).length;
                        setTimeout(() => { for(let i=0;i<c;i++){ let cb=document.getElementById(`${s}-bb-dmg-${i}`); if(cb)cb.checked=(i<dmgC); }}, 100);
                    }
                });
            };
            refresh(fA, 'A'); refresh(fD, 'D');
            
            document.getElementById('A-sub-submerge').checked = false;
            document.getElementById('D-sub-submerge').checked = false;

            const m = document.getElementById('messageBox');
            m.className = 'mt-6 p-4 rounded bg-gray-800 border border-blue-500 block';
            m.innerHTML = `Round Complete. Attacker Hits: ${aSH+aHits} | Defender Hits: ${aaH+dSH+dHits}`;
            
            // CRITICAL: Pushes the final calculation results to everyone else's screen!
            syncToFirebase();
        }

        function clearBattle() {
            UNIT_DATA.forEach(u => {
                document.getElementById(`A-${u.id}`).value = 0; document.getElementById(`D-${u.id}`).value = 0;
                document.getElementById(`A-${u.id}-rem`).textContent = ''; document.getElementById(`D-${u.id}-rem`).textContent = '';
                document.getElementById(`A-${u.id}-rolls`).innerHTML = ''; document.getElementById(`D-${u.id}-rolls`).innerHTML = '';
            });
            document.getElementById('messageBox').classList.add('hidden');
            syncToFirebase();
        }
        renderRows();
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBNA3O_dP03GvdBBZHZ2OcKwhxtOu1T2yM",
            authDomain: "axis-and-allies-combat-board.firebaseapp.com",
            databaseURL: "https://axis-and-allies-combat-board-default-rtdb.firebaseio.com",
            projectId: "axis-and-allies-combat-board",
            storageBucket: "axis-and-allies-combat-board.firebasestorage.app",
            messagingSenderId: "358860543165",
            appId: "1:358860543165:web:f712bbdf4f1d9406ba93d4",
            measurementId: "G-0LWBRW3TJG"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function syncToFirebase() {
            const s = {}; 
            UNIT_DATA.forEach(u => { 
                s[`A-${u.id}`] = document.getElementById(`A-${u.id}`).value; 
                s[`D-${u.id}`] = document.getElementById(`D-${u.id}`).value; 
                s[`A-${u.id}-rolls`] = document.getElementById(`A-${u.id}-rolls`).innerHTML;
                s[`D-${u.id}-rolls`] = document.getElementById(`D-${u.id}-rolls`).innerHTML;
                if(u.id==='sub') {
                    s[`A-sub-sub`] = document.getElementById('A-sub-submerge').checked;
                    s[`D-sub-sub`] = document.getElementById('D-sub-submerge').checked;
                }
                if(u.id==='bb') {
                    const aBB = document.getElementById('A-bb-markers')?.querySelectorAll('input') || [];
                    const dBB = document.getElementById('D-bb-markers')?.querySelectorAll('input') || [];
                    s[`A-bb-dmg`] = Array.from(aBB).map(c => c.checked);
                    s[`D-bb-dmg`] = Array.from(dBB).map(c => c.checked);
                }
            });
            s.msg = document.getElementById('messageBox').innerHTML;
            s.msgVisible = !document.getElementById('messageBox').classList.contains('hidden');
            db.ref("liveGame").set(s);
        }

        db.ref("liveGame").on("value", (snap) => {
            const d = snap.val(); 
            if(d) {
                UNIT_DATA.forEach(u => {
                    const aI = document.getElementById(`A-${u.id}`);
                    const dI = document.getElementById(`D-${u.id}`);
                    if(aI && document.activeElement !== aI) aI.value = d[`A-${u.id}`] || 0;
                    if(dI && document.activeElement !== dI) dI.value = d[`D-${u.id}`] || 0;
                    
                    document.getElementById(`A-${u.id}-rolls`).innerHTML = d[`A-${u.id}-rolls`] || '';
                    document.getElementById(`D-${u.id}-rolls`).innerHTML = d[`D-${u.id}-rolls`] || '';
                    document.getElementById(`A-${u.id}-rem`).textContent = (d[`A-${u.id}`] > 0) ? d[`A-${u.id}`] : '';
                    document.getElementById(`D-${u.id}-rem`).textContent = (d[`D-${u.id}`] > 0) ? d[`D-${u.id}`] : '';

                    if(u.id==='sub') {
                        document.getElementById('A-sub-submerge').checked = d[`A-sub-sub`] || false;
                        document.getElementById('D-sub-submerge').checked = d[`D-sub-sub`] || false;
                    }
                    if(u.id==='bb') {
                        updateBBMarkers('A'); updateBBMarkers('D');
                        const aDmg = d[`A-bb-dmg`] || [];
                        const dDmg = d[`D-bb-dmg`] || [];
                        setTimeout(() => {
                           aDmg.forEach((v, i) => { if(document.getElementById(`A-bb-dmg-${i}`)) document.getElementById(`A-bb-dmg-${i}`).checked = v; });
                           dDmg.forEach((v, i) => { if(document.getElementById(`D-bb-dmg-${i}`)) document.getElementById(`D-bb-dmg-${i}`).checked = v; });
                        }, 150);
                    }
                });
                const m = document.getElementById('messageBox');
                m.innerHTML = d.msg || '';
                if(d.msgVisible) m.classList.remove('hidden'); else m.classList.add('hidden');
                updateAttackDisplay();
            }
        });

        document.addEventListener('input', (e) => { if(e.target.type==='number') syncToFirebase(); });
    </script>
</body>
</html>
